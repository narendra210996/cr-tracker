<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Dashboard — Narendra</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a2f42;
  --text:#e8eaf0;--muted:#6b7280;--accent:#4f8ef7;--green:#34d399;
  --amber:#fbbf24;--red:#f87171;--purple:#a78bfa;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0;}

/* Background grid */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3;pointer-events:none;z-index:0;}

.wrapper{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:48px 32px;}

/* Header */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:52px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;box-shadow:0 0 12px var(--accent);}
.logo-text{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
.top-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:5px 12px;border-radius:20px;}

/* Hero */
.hero{margin-bottom:52px;}
.hero-label{font-size:11px;font-weight:600;color:var(--accent);letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px;}
.hero-title{font-size:38px;font-weight:700;color:var(--text);line-height:1.15;margin-bottom:10px;}
.hero-title span{color:var(--accent);}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.7;}

/* Summary strip */
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:48px;}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.sum-val{font-size:28px;font-weight:700;color:var(--text);line-height:1;}
.sum-lbl{font-size:11px;color:var(--muted);margin-top:6px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;}
.sum-card.ac .sum-val{color:var(--accent);}
.sum-card.gr .sum-val{color:var(--green);}
.sum-card.am .sum-val{color:var(--amber);}
.sum-card.pu .sum-val{color:var(--purple);}

/* Section heading */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.sec-head-line{flex:1;height:1px;background:var(--border);}
.sec-head-txt{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}

/* Project cards */
.projects-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:40px;}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.proj-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,142,247,.06) 0%,transparent 60%);opacity:0;transition:opacity .2s;}
.proj-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,142,247,.12);}
.proj-card:hover::before{opacity:1;}
.proj-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.proj-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.proj-arrow{font-size:18px;color:var(--muted);transition:all .2s;}
.proj-card:hover .proj-arrow{color:var(--accent);transform:translateX(3px);}
.proj-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;}
.proj-desc{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:18px;}
.proj-stats{display:flex;gap:16px;margin-bottom:14px;}
.proj-stat{text-align:center;}
.proj-stat-val{font-size:18px;font-weight:700;color:var(--text);}
.proj-stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}
.proj-bar-wrap{margin-bottom:8px;}
.proj-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.proj-bar-lbl{font-size:11px;color:var(--muted);}
.proj-bar-pct{font-size:12px;font-weight:700;}
.proj-bar-bg{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.proj-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
.proj-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.proj-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted);}

/* Add project card */
.proj-card-add{background:transparent;border:1px dashed var(--border);border-radius:14px;padding:24px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:200px;}
.proj-card-add:hover{border-color:var(--accent);background:rgba(79,142,247,.04);}
.proj-card-add .add-icon{font-size:28px;color:var(--muted);}
.proj-card-add .add-txt{font-size:13px;color:var(--muted);font-weight:500;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:460px;max-width:90vw;}
.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:20px;}
.modal-grid{display:grid;gap:12px;margin-bottom:20px;}
.modal-grid input,.modal-grid select,.modal-grid textarea{font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;width:100%;font-family:inherit;transition:border .15s;}
.modal-grid input:focus,.modal-grid select:focus,.modal-grid textarea:focus{border-color:var(--accent);}
.modal-grid select option{background:var(--surface);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.mbtn{font-size:12px;font-weight:600;padding:8px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all .15s;}
.mbtn:hover{background:var(--border);}
.mbtn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.mbtn-primary:hover{background:#3a7de8;}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);color:var(--text);border:1px solid var(--border);font-size:12px;font-weight:600;padding:10px 18px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}

@media(max-width:640px){
  .projects-grid{grid-template-columns:1fr;}
  .summary-strip{grid-template-columns:1fr 1fr;}
  .hero-title{font-size:26px;}
  .wrapper{padding:28px 18px;}
}
</style>
</head>
<body>
<div class="wrapper">
  <div class="top-bar">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-text">Narendra · Project Hub</div>
    </div>
    <div class="top-date" id="top-date"></div>
  </div>

  <div class="hero">
    <div class="hero-label">BA Dashboard</div>
    <div class="hero-title">All Projects,<br><span>One Place.</span></div>
    <div class="hero-sub">Click any project to view its CR Tracker — track stages, UAT, delivery dates and progress.</div>
  </div>

  <div class="summary-strip">
    <div class="sum-card ac"><div class="sum-val" id="s-projects">0</div><div class="sum-lbl">Total Projects</div></div>
    <div class="sum-card gr"><div class="sum-val" id="s-crs">0</div><div class="sum-lbl">Total CRs</div></div>
    <div class="sum-card am"><div class="sum-val" id="s-inprogress">0</div><div class="sum-lbl">In Progress</div></div>
    <div class="sum-card pu"><div class="sum-val" id="s-done">0</div><div class="sum-lbl">Go Live</div></div>
  </div>

  <div class="sec-head">
    <div class="sec-head-txt">Your Projects</div>
    <div class="sec-head-line"></div>
  </div>

  <div class="projects-grid" id="projects-grid"></div>
</div>

<!-- Add Project Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Add New Project</div>
    <div class="modal-grid">
      <input type="text" id="m-name" placeholder="Project name  e.g. Settlement Module"/>
      <input type="text" id="m-desc" placeholder="Short description"/>
      <select id="m-icon">
        <option value="🏗️">🏗️ Development</option>
        <option value="📊">📊 Reporting</option>
        <option value="⚙️">⚙️ Operations</option>
        <option value="🛡️">🛡️ Compliance</option>
        <option value="📱">📱 App</option>
        <option value="🔗">🔗 Middleware</option>
        <option value="💼">💼 Back Office</option>
        <option value="🔍">🔍 Risk</option>
      </select>
      <select id="m-color">
        <option value="#4f8ef7">Blue</option>
        <option value="#34d399">Green</option>
        <option value="#fbbf24">Amber</option>
        <option value="#a78bfa">Purple</option>
        <option value="#f87171">Red</option>
        <option value="#22d3ee">Cyan</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="mbtn" onclick="closeModal()">Cancel</button>
      <button class="mbtn mbtn-primary" onclick="saveProject()">Add Project</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROJ_KEY = 'narendra_projects_v1';

const DEFAULT_PROJECTS = [
  {
    id:'rms',name:'RMS Development',
    desc:'Risk Management System — margin, MTF, collateral, SQ off and related CRs.',
    icon:'🔍',color:'#4f8ef7',
    file:'cr-tracker-rms.html'
  },
  {
    id:'middleware',name:'Middleware',
    desc:'Middleware layer CRs — API integrations, data flow, and vendor connectivity.',
    icon:'🔗',color:'#a78bfa',
    file:'cr-tracker-middleware.html'
  },
  {
    id:'backoffice',name:'Back Office',
    desc:'Payout processing, sub-broker commissions, reconciliation and back office ops.',
    icon:'💼',color:'#fbbf24',
    file:'cr-tracker-backoffice.html'
  },
  {
    id:'compliance',name:'Compliance',
    desc:'SEBI guidelines, DDPI, peak margin reporting and regulatory CRs.',
    icon:'🛡️',color:'#34d399',
    file:'cr-tracker-compliance.html'
  },
];

// CR storage keys per project — we read from each project's localStorage key
const PROJECT_CR_KEYS = {
  'rms':        'vatsal_cr_v4',        // existing RMS CRs
  'middleware':  'narendra_cr_middleware_v1',
  'backoffice':  'narendra_cr_backoffice_v1',
  'compliance':  'narendra_cr_compliance_v1',
};

let PROJECTS = [];

function loadProjects(){
  try{
    const raw = localStorage.getItem(PROJ_KEY);
    if(raw){ const p=JSON.parse(raw); if(Array.isArray(p)&&p.length>0){PROJECTS=p;return;} }
  }catch(e){}
  PROJECTS = JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
  saveProjects();
}
function saveProjects(){ try{localStorage.setItem(PROJ_KEY,JSON.stringify(PROJECTS));}catch(e){} }

function getCRsForProject(proj){
  try{
    const key = PROJECT_CR_KEYS[proj.id] || ('narendra_cr_'+proj.id+'_v1');
    const raw = localStorage.getItem(key);
    if(raw){ const p=JSON.parse(raw); if(Array.isArray(p)) return p; }
  }catch(e){}
  return [];
}

function avgProgress(crs){
  if(!crs.length) return 0;
  const STAGES=['Requirement Gathering','Vendor Data Submission','Development','QA / Testing','UAT','Go Live'];
  const pcts = crs.map(c=>{
    if(c.stage==='On Hold') return 0;
    const idx = STAGES.indexOf(c.stage);
    return Math.round(((idx>=0?idx:0)+1)/STAGES.length*100);
  });
  return Math.round(pcts.reduce((a,b)=>a+b,0)/pcts.length);
}

function barColor(pct){
  if(pct>=80) return '#34d399';
  if(pct>=40) return '#4f8ef7';
  return '#fbbf24';
}

function renderProjects(){
  const grid = document.getElementById('projects-grid');
  let totalCRs=0, inProgress=0, goLive=0;

  const cards = PROJECTS.map(proj=>{
    const crs = getCRsForProject(proj);
    const total = crs.length;
    const done = crs.filter(c=>c.stage==='Go Live').length;
    const active = crs.filter(c=>c.stage!=='Go Live'&&c.stage!=='On Hold').length;
    const onHold = crs.filter(c=>c.stage==='On Hold').length;
    const pct = avgProgress(crs);
    const fill = barColor(pct);
    totalCRs+=total; inProgress+=active; goLive+=done;

    const stageBreakdown = total>0
      ? `<span class="proj-tag">✅ ${done} Go Live</span><span class="proj-tag">🔄 ${active} Active</span>${onHold?`<span class="proj-tag">⏸ ${onHold} On Hold</span>`:''}`
      : `<span class="proj-tag">No CRs yet — click to add</span>`;

    return `<div class="proj-card" onclick="openProject('${proj.id}')">
      <div class="proj-top">
        <div class="proj-icon" style="background:${proj.color}22;">${proj.icon}</div>
        <div class="proj-arrow">→</div>
      </div>
      <div class="proj-name">${proj.name}</div>
      <div class="proj-desc">${proj.desc}</div>
      <div class="proj-bar-wrap">
        <div class="proj-bar-top">
          <div class="proj-bar-lbl">Overall Progress · ${total} CR${total!==1?'s':''}</div>
          <div class="proj-bar-pct" style="color:${fill};">${pct}%</div>
        </div>
        <div class="proj-bar-bg"><div class="proj-bar-fill" style="width:${pct}%;background:${fill};"></div></div>
      </div>
      <div class="proj-tags">${stageBreakdown}</div>
    </div>`;
  }).join('');

  grid.innerHTML = cards + `<div class="proj-card-add" onclick="openModal()">
    <div class="add-icon">＋</div>
    <div class="add-txt">Add New Project</div>
  </div>`;

  // Update summary
  document.getElementById('s-projects').textContent = PROJECTS.length;
  document.getElementById('s-crs').textContent = totalCRs;
  document.getElementById('s-inprogress').textContent = inProgress;
  document.getElementById('s-done').textContent = goLive;
}

function openProject(id){
  const proj = PROJECTS.find(p=>p.id===id);
  if(!proj) return;
  // Store which project is selected so the CR tracker knows
  localStorage.setItem('narendra_active_project', JSON.stringify({id:proj.id, name:proj.name, icon:proj.icon, color:proj.color}));
  window.location.href = 'index2.html?project='+proj.id;
}

function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

function saveProject(){
  const name = document.getElementById('m-name').value.trim();
  if(!name){ toast('Project name is required'); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]/g,'_')+'_'+Date.now();
  PROJECTS.push({
    id, name,
    desc: document.getElementById('m-desc').value||'No description added.',
    icon: document.getElementById('m-icon').value,
    color: document.getElementById('m-color').value,
    file: 'cr-tracker-'+id+'.html'
  });
  saveProjects();
  closeModal();
  renderProjects();
  toast('✓ Project added');
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

// Init
loadProjects();
document.getElementById('top-date').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short',year:'numeric'});
renderProjects();
</script>
</body>
</html>
